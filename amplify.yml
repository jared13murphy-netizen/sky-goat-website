# AWS Amplify build spec for sky-goat.com
#
# This file lets Amplify auto-configure when you connect the repo —
# no manual edits to build settings needed. Amplify reads this file
# and figures out it's a static site whose contents live in /site.
#
# Static site = no build step. We just tell Amplify "serve every
# file in the /site directory".
version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    baseDirectory: site
    files:
      - '**/*'
  cache:
    paths: []
