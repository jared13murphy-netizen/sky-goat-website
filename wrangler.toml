# Cloudflare Workers + Static Assets config.
#
# Cloudflare merged the old "Pages" product into Workers with a
# static assets binding. This file tells `wrangler deploy` to upload
# everything in /site as static content. Cloudflare serves it at
# sky-goat-website.<account>.workers.dev (and at the custom domain
# once that's wired up).
#
# No build step — these are plain HTML files.

name = "sky-goat-website"
compatibility_date = "2025-06-08"

# Worker script wraps the static-asset serving so we can add dynamic
# routes. /f/{ident} renders a smart-redirect page that tries to open
# the Sky Goat app (skygoat://flight/{ident}) and falls back to the
# App Store. Everything else falls through to env.ASSETS.fetch().
main = "./src/worker.js"

[assets]
directory = "./site"
# Bind the static asset namespace as env.ASSETS so the Worker can
# call env.ASSETS.fetch(request) for non-dynamic routes.
binding = "ASSETS"
# Clean URLs: a request to /privacy is served from /privacy.html,
# and /privacy.html is 301-redirected to /privacy. Same for
# /contact ↔ /contact.html. Apple's App Privacy field will accept
# either form, but clean URLs (sky-goat.com/privacy) read better
# in App Store Connect than .html-suffixed ones.
html_handling = "auto-trailing-slash"
# Fall back to /index.html for unknown paths.
not_found_handling = "single-page-application"
