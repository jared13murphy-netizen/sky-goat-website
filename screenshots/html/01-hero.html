<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: linear-gradient(180deg, #0EA5E9 0%, #26AEEB 50%, #93D7F5 100%); }
  .goat-wrap {
    position: absolute; top: 950px; left: 0; right: 0;
    display: flex; justify-content: center;
  }
  .goat-wrap img { width: 700px; filter: drop-shadow(0 30px 80px rgba(0,0,0,0.25)); }
  .download {
    position: absolute; bottom: 240px; left: 0; right: 0;
    display: flex; justify-content: center;
  }
  .pill {
    background: #0F172A; color: white; padding: 50px 90px;
    border-radius: 999px; font-size: 56px; font-weight: 800;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
  }
</style></head>
<body>
<div class="status-bar light">
  <div class="time">9:41</div>
  <div class="right"><span class="signal"></span><span class="wifi"></span><span class="battery"></span></div>
</div>
<div class="tagline">
  <h2>The sky just got <em>interesting.</em></h2>
  <p class="sub">Your in-flight tour guide.</p>
</div>
<div class="goat-wrap">
  <img src="../../assets/goat-logo.png" alt="">
</div>
<div class="download">
  <div class="pill">Free on the App Store</div>
</div>
</body></html>
