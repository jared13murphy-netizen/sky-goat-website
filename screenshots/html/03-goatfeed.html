<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { background: linear-gradient(180deg, #0EA5E9 0%, #26AEEB 50%, #fff 100%); }
  .device {
    position: absolute; top: 700px; left: 130px; right: 130px;
    height: 1900px; border-radius: 60px; overflow: hidden;
    background: #fff; box-shadow: 0 50px 100px rgba(0,0,0,0.35);
    display: flex; flex-direction: column;
  }
  /* Route header */
  .ifh { background: #0F172A; padding: 50px 60px 36px; color: white; }
  .ifh .ident { font-size: 26px; font-weight: 800; color: var(--sky-blue); letter-spacing: 4px; text-align: center; margin-bottom: 12px; }
  .ifh .route { font-size: 70px; font-weight: 900; letter-spacing: 3px; text-align: center; }
  .ifh .progress { margin: 30px 0 20px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; position: relative; }
  .ifh .progress::after { content: ''; position: absolute; left: 0; top: 0; width: 38%; height: 100%; background: var(--sky-blue); border-radius: 4px; }
  .ifh .meta { font-size: 24px; color: rgba(255,255,255,0.85); text-align: center; letter-spacing: 1px; }
  /* Map */
  .map {
    height: 700px; position: relative; overflow: hidden;
    background:
      radial-gradient(circle at 60% 40%, #6b8e54 0%, transparent 30%),
      radial-gradient(circle at 30% 60%, #5a7a4a 0%, transparent 25%),
      linear-gradient(135deg, #7ba366 0%, #5d8e4e 100%);
  }
  .map .path {
    position: absolute; top: 30%; left: 12%; right: 18%; height: 6px;
    background: var(--sky-blue); transform: rotate(6deg);
    box-shadow: 0 0 24px rgba(14,165,233,0.7);
  }
  .map .goat-pin {
    position: absolute; top: 40%; left: 50%; width: 110px; height: 110px;
    background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 32px rgba(0,0,0,0.3); transform: translate(-50%, -50%);
  }
  .map .goat-pin img { width: 70px; }
  .map .flying-near {
    position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(15,23,42,0.85); color: white; padding: 18px 32px; border-radius: 999px;
    font-size: 24px; font-weight: 700;
  }
  .map .flying-near .lbl { font-size: 18px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-right: 12px; }
  /* Sheet */
  .sheet { flex: 1; padding: 24px 40px 0; background: white; }
  .sheet .handle { width: 80px; height: 8px; background: #cbd5e1; border-radius: 4px; margin: 0 auto 20px; }
  .sheet .heading { font-size: 44px; font-weight: 900; margin-bottom: 24px; color: #0F172A; }
  .sheet .card { background: #E0F2FE; border-left: 6px solid var(--sky-blue); border-radius: 18px; padding: 28px 32px; margin-bottom: 18px; }
  .sheet .card .top { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--sky-blue-deep); margin-bottom: 12px; }
  .sheet .card .title { font-size: 36px; font-weight: 800; color: #0F172A; }
</style></head>
<body>
<div class="status-bar light">
  <div class="time">9:41</div>
  <div class="right"><span class="signal"></span><span class="wifi"></span><span class="battery"></span></div>
</div>
<div class="tagline">
  <h2>Look out the <em>window.</em></h2>
  <p class="sub">Real-time call-outs every couple minutes.</p>
</div>
<div class="device">
  <div class="ifh">
    <div class="ident">DAL 2225</div>
    <div class="route">MSP &nbsp;→&nbsp; MCO</div>
    <div class="progress"></div>
    <div class="meta">En Route · 38% there · 30,000 ft · 478 kt</div>
  </div>
  <div class="map">
    <div class="flying-near"><span class="lbl">FLYING NEAR</span> Quincy, IL</div>
    <div class="path"></div>
    <div class="goat-pin"><img src="../../assets/goat-logo.png" alt=""></div>
  </div>
  <div class="sheet">
    <div class="handle"></div>
    <div class="heading">Goat Feed</div>
    <div class="card">
      <div class="top"><span>JUST TO THE RIGHT</span><span>13 mi</span></div>
      <div class="title">Gateway Arch</div>
    </div>
    <div class="card">
      <div class="top"><span>FAMOUS PERSON</span><span></span></div>
      <div class="title">Born in Quincy, IL</div>
    </div>
  </div>
</div>
</body></html>
